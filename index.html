<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI 智能投研助手流程图 · RAG + Agent + Skills</title>
<script>
  (function () {
    const saved = localStorage.getItem("ai-investment-flow-theme");
    const dark = saved ? saved === "dark" : matchMedia("(prefers-color-scheme: dark)").matches;
    document.documentElement.classList.toggle("dark", dark);
  })();
</script>
<style>
  :root {
    --bg: #fbfaf7;
    --surface: #ffffff;
    --surface-2: #f2efe8;
    --surface-3: #ece7dc;
    --ink: #171716;
    --body: #3f3e3a;
    --muted: #7b786f;
    --line: #d8d2c4;
    --line-soft: #e9e3d7;
    --edge: #8a867b;
    --active: #d85b2f;
    --active-soft: rgba(216, 91, 47, 0.12);
    --amber: #bf8d24;
    --amber-soft: rgba(191, 141, 36, 0.14);
    --teal: #247c78;
    --teal-soft: rgba(36, 124, 120, 0.12);
    --green: #617a35;
    --green-soft: rgba(97, 122, 53, 0.13);
    --blue: #326ea8;
    --blue-soft: rgba(50, 110, 168, 0.12);
    --violet: #7956a9;
    --violet-soft: rgba(121, 86, 169, 0.12);
    --red: #b74343;
    --red-soft: rgba(183, 67, 67, 0.12);
    --shadow: rgba(32, 28, 20, 0.12);
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  }

  html.dark {
    --bg: #171614;
    --surface: #22201c;
    --surface-2: #2d2a24;
    --surface-3: #383227;
    --ink: #fffaf0;
    --body: #ddd5c6;
    --muted: #a9a093;
    --line: #51493d;
    --line-soft: #39342c;
    --edge: #b1a696;
    --active: #ff7a3d;
    --active-soft: rgba(255, 122, 61, 0.15);
    --amber: #e2b85f;
    --amber-soft: rgba(226, 184, 95, 0.17);
    --teal: #58bab2;
    --teal-soft: rgba(88, 186, 178, 0.15);
    --green: #9dbb69;
    --green-soft: rgba(157, 187, 105, 0.16);
    --blue: #73a8df;
    --blue-soft: rgba(115, 168, 223, 0.16);
    --violet: #b192df;
    --violet-soft: rgba(177, 146, 223, 0.15);
    --red: #ee7a73;
    --red-soft: rgba(238, 122, 115, 0.15);
    --shadow: rgba(0, 0, 0, 0.34);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    color: var(--body);
    background:
      radial-gradient(circle at 17% 8%, var(--amber-soft), transparent 25%),
      radial-gradient(circle at 82% 18%, var(--teal-soft), transparent 23%),
      var(--bg);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  .topbar {
    height: 74px;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 18px;
    border-bottom: 1px solid var(--line-soft);
    background: color-mix(in srgb, var(--bg) 88%, transparent);
    backdrop-filter: blur(12px);
  }

  .titleblock { min-width: 310px; }
  h1 {
    margin: 0;
    color: var(--ink);
    font-size: 19px;
    line-height: 1.2;
    font-weight: 760;
    letter-spacing: 0;
  }
  .subtitle {
    margin-top: 5px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.04em;
  }

  .chips {
    display: flex;
    gap: 7px;
    align-items: center;
    flex-wrap: wrap;
    flex: 1;
  }

  .chip,
  .small-btn {
    min-height: 30px;
    border: 1px solid var(--line);
    background: var(--surface);
    color: var(--body);
    border-radius: 8px;
    padding: 6px 10px;
    font: 12px/1 var(--mono);
    cursor: pointer;
    transition: background .16s ease, border-color .16s ease, color .16s ease, transform .16s ease;
  }
  .chip:hover,
  .small-btn:hover { transform: translateY(-1px); border-color: var(--muted); color: var(--ink); }
  .chip.on {
    color: var(--bg);
    background: var(--ink);
    border-color: var(--ink);
  }

  .stage {
    position: relative;
    height: calc(100vh - 74px);
    min-height: 0;
    overflow: auto;
    overscroll-behavior: contain;
  }

  .stage svg {
    display: block;
    width: 1900px;
    height: 1400px;
    max-width: none;
    max-height: none;
  }

  .zone rect {
    fill: color-mix(in srgb, var(--surface) 48%, transparent);
    stroke: var(--line);
    stroke-width: 1.2;
    stroke-dasharray: 7 5;
    rx: 10;
  }
  .zone .zt {
    fill: var(--ink);
    font: 700 14px/1 var(--mono);
    letter-spacing: 0.05em;
  }
  .zone .zs {
    fill: var(--muted);
    font: 11px/1 var(--mono);
  }

  .node { cursor: pointer; transition: opacity .2s ease; }
  .node rect {
    fill: var(--surface);
    stroke: var(--line);
    stroke-width: 1.45;
    rx: 8;
    filter: drop-shadow(0 7px 16px var(--shadow));
    transition: stroke .16s ease, fill .16s ease;
  }
  .node:hover rect { stroke: var(--active); }
  .node.selected rect { stroke: var(--active); stroke-width: 2.2; }
  .node .nt {
    fill: var(--ink);
    font: 700 14px/1.15 var(--sans);
  }
  .node .nm {
    fill: var(--muted);
    font: 11px/1.25 var(--mono);
  }
  .node .tag {
    fill: var(--active);
    font: 700 10px/1 var(--mono);
    letter-spacing: 0.08em;
  }
  .node.input rect { fill: var(--amber-soft); stroke: var(--amber); }
  .node.process rect { fill: var(--surface); }
  .node.store rect { fill: var(--teal-soft); stroke: var(--teal); }
  .node.gate rect { fill: var(--blue-soft); stroke: var(--blue); }
  .node.tool rect { fill: var(--green-soft); stroke: var(--green); }
  .node.plan rect { fill: var(--violet-soft); stroke: var(--violet); }
  .node.risk rect { fill: var(--red-soft); stroke: var(--red); }
  .node.ui rect { fill: var(--surface-2); stroke: var(--amber); }
  .node.memory rect { fill: var(--surface-3); stroke: var(--violet); stroke-dasharray: 6 4; }

  .edge {
    fill: none;
    stroke: var(--edge);
    stroke-width: 1.55;
    marker-end: url(#arrow);
    opacity: .84;
    transition: stroke .2s ease, opacity .2s ease;
  }
  .edge.dashed { stroke-dasharray: 6 5; }
  .edge.strong { stroke-width: 2.2; }
  .edge-label {
    fill: var(--muted);
    font: 10.5px/1 var(--mono);
    transition: fill .2s ease, opacity .2s ease;
  }

  .flowing .edge { opacity: .12; }
  .flowing .edge-label { opacity: .18; }
  .flowing .node { opacity: .28; }
  .flowing .zone { opacity: .42; }
  .flowing .edge.lit {
    opacity: 1;
    stroke: var(--active);
    marker-end: url(#arrow-active);
    stroke-dasharray: 8 5;
    animation: dash 1s linear infinite;
  }
  .flowing .edge-label.lit { opacity: 1; fill: var(--active); }
  .flowing .node.lit { opacity: 1; }
  .flowing .node.lit rect { stroke: var(--active); }
  @keyframes dash { to { stroke-dashoffset: -13; } }
  @media (prefers-reduced-motion: reduce) {
    .flowing .edge.lit { animation: none; }
    .chip, .small-btn { transition: none; }
  }

  .panel {
    position: absolute;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: color-mix(in srgb, var(--surface) 94%, transparent);
    box-shadow: 0 14px 44px var(--shadow);
    backdrop-filter: blur(12px);
  }

  #detail {
    width: 360px;
    right: 16px;
    bottom: 16px;
    padding: 14px 15px;
  }
  #detail h2 {
    margin: 0 0 4px;
    color: var(--ink);
    font-size: 16px;
    line-height: 1.25;
  }
  #detail .meta {
    margin-bottom: 8px;
    color: var(--active);
    font: 11px/1.35 var(--mono);
    letter-spacing: 0.05em;
  }
  #detail p {
    margin: 8px 0 0;
    color: var(--body);
    font-size: 12.5px;
    line-height: 1.6;
  }
  #detail code {
    color: var(--ink);
    background: var(--surface-2);
    border: 1px solid var(--line-soft);
    border-radius: 5px;
    padding: 1px 4px;
    font: 11px/1 var(--mono);
  }

  #flowcap {
    left: 16px;
    bottom: 16px;
    max-width: 520px;
    padding: 13px 15px;
    display: none;
  }
  #flowcap.show { display: block; }
  #flowcap .fname {
    color: var(--active);
    font: 700 11px/1 var(--mono);
    letter-spacing: 0.08em;
    margin-bottom: 7px;
  }
  #flowcap p {
    margin: 0;
    font-size: 12.5px;
    line-height: 1.55;
  }

  .collapse-toggle,
  .drawer-link {
    border: 1px solid var(--line);
    background: var(--surface-2);
    color: var(--body);
    border-radius: 6px;
    cursor: pointer;
    font: 12px/1 var(--mono);
  }
  .collapse-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 30px;
    height: 30px;
    padding: 0;
    font-size: 20px;
    line-height: 1;
    box-shadow: 0 7px 18px var(--shadow);
  }
  .collapse-toggle[aria-expanded="true"] {
    background: var(--active);
    border-color: var(--active);
    color: var(--bg);
  }
  .drawer-link {
    min-height: 28px;
    padding: 6px 10px;
  }
  .drawer-link:hover,
  .collapse-toggle:hover {
    border-color: var(--active);
    color: var(--ink);
  }
  .node-collapse {
    width: 600px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: color-mix(in srgb, var(--surface) 96%, transparent);
    box-shadow: 0 14px 44px var(--shadow);
    overflow: hidden;
  }
  .collapse-host {
    overflow: visible;
  }
  .collapse-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--line-soft);
    color: var(--ink);
    font: 700 13px/1 var(--sans);
  }
  .collapse-sub {
    display: block;
    margin-top: 4px;
    color: var(--muted);
    font: 10px/1.25 var(--mono);
  }
  .collapse-body {
    max-height: 344px;
    overflow: auto;
    padding: 10px 12px 12px;
  }
  .subtable {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 8px;
    border-collapse: separate;
    border-spacing: 0;
    overflow: hidden;
    background: var(--surface);
  }
  .subtable th,
  .subtable td {
    border-bottom: 1px solid var(--line-soft);
    padding: 8px 10px;
    font-size: 12px;
    line-height: 1.45;
    vertical-align: top;
  }
  .subtable tr:last-child td {
    border-bottom: 0;
  }
  .subtable th {
    width: 104px;
    background: var(--surface-2);
    color: var(--ink);
    font-weight: 700;
    text-align: left;
  }
  .pill {
    display: inline-flex;
    align-items: center;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 3px 8px;
    background: var(--surface-2);
    color: var(--muted);
    font: 11px/1 var(--mono);
    white-space: nowrap;
  }

  .drawer-mask {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.38);
    opacity: 0;
    pointer-events: none;
    transition: opacity .18s ease;
    z-index: 40;
  }
  .drawer {
    position: fixed;
    top: 0;
    right: 0;
    width: min(560px, 92vw);
    height: 100vh;
    background: var(--surface);
    border-left: 1px solid var(--line);
    box-shadow: -18px 0 46px var(--shadow);
    transform: translateX(100%);
    transition: transform .22s ease;
    z-index: 41;
    display: flex;
    flex-direction: column;
  }
  .drawer.wide {
    width: min(1040px, 96vw);
  }
  body.drawer-open .drawer-mask {
    opacity: 1;
    pointer-events: auto;
  }
  body.drawer-open .drawer {
    transform: translateX(0);
  }
  .drawer-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--line-soft);
  }
  .drawer-header h2 {
    margin: 0 0 6px;
    color: var(--ink);
    font-size: 19px;
    line-height: 1.25;
  }
  .drawer-meta {
    color: var(--active);
    font: 12px/1.4 var(--mono);
  }
  .drawer-close {
    border: 0;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 24px;
    line-height: 1;
    padding: 2px 4px;
  }
  .drawer-close:hover {
    color: var(--ink);
  }
  .drawer-body {
    padding: 18px 20px 28px;
    overflow: auto;
  }
  .drawer-section {
    margin-bottom: 18px;
  }
  .drawer-section h3 {
    margin: 0 0 8px;
    color: var(--ink);
    font-size: 14px;
  }
  .drawer-section p {
    margin: 0;
    font-size: 13px;
    line-height: 1.65;
  }
  .drawer-grid {
    display: grid;
    grid-template-columns: 120px 1fr;
    border: 1px solid var(--line);
    border-radius: 8px;
    overflow: hidden;
  }
  .drawer-grid div {
    padding: 10px 11px;
    border-bottom: 1px solid var(--line-soft);
    font-size: 12.5px;
    line-height: 1.5;
  }
  .drawer-grid div:nth-child(odd) {
    background: var(--surface-2);
    color: var(--ink);
    font-weight: 700;
  }
  .drawer-grid div:nth-last-child(-n+2) {
    border-bottom: 0;
  }
  .drawer-table-scroll {
    overflow: auto;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--surface);
  }
  .drawer-table {
    width: 100%;
    min-width: 760px;
    border-collapse: separate;
    border-spacing: 0;
  }
  .drawer-table th,
  .drawer-table td {
    border-right: 1px solid var(--line-soft);
    border-bottom: 1px solid var(--line-soft);
    padding: 10px 12px;
    font-size: 12.5px;
    line-height: 1.55;
    vertical-align: top;
    text-align: left;
  }
  .drawer-table th {
    color: var(--ink);
    background: var(--surface-2);
    font-weight: 760;
  }
  .drawer-table tr:last-child td {
    border-bottom: 0;
  }
  .drawer-table th:last-child,
  .drawer-table td:last-child {
    border-right: 0;
  }
  .drawer-section-note {
    margin: -2px 0 10px;
    color: var(--muted);
    font: 12px/1.6 var(--sans);
  }

  .legend {
    position: absolute;
    left: 16px;
    top: 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    max-width: 760px;
  }
  .legend span {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: color-mix(in srgb, var(--surface) 88%, transparent);
    color: var(--muted);
    padding: 5px 9px;
    font: 11px/1 var(--mono);
  }
  .sw {
    width: 9px;
    height: 9px;
    border-radius: 2px;
    background: var(--surface-2);
    border: 1px solid var(--line);
  }
  .sw.input { background: var(--amber-soft); border-color: var(--amber); }
  .sw.store { background: var(--teal-soft); border-color: var(--teal); }
  .sw.tool { background: var(--green-soft); border-color: var(--green); }
  .sw.plan { background: var(--violet-soft); border-color: var(--violet); }
  .sw.risk { background: var(--red-soft); border-color: var(--red); }

  @media (max-width: 1100px) {
    body { overflow: auto; }
    .topbar { height: auto; align-items: flex-start; flex-direction: column; }
    .titleblock { min-width: 0; }
    .stage { height: 940px; overflow: auto; }
    .stage svg { min-width: 1500px; min-height: 1050px; }
    .panel, .legend { position: static; margin: 10px 14px; }
    #detail, #flowcap { width: auto; max-width: none; }
  }
</style>
</head>
<body>
  <header class="topbar">
    <div class="titleblock">
      <h1>AI 智能投研助手流程图</h1>
      <div class="subtitle">Offline RAG KB · Online ReAct Agent · DeltaFStation Tools</div>
    </div>
    <nav class="chips" id="chips" aria-label="路径高亮">
      <button class="chip on" data-flow="all">全景</button>
      <button class="chip" data-flow="offline">1 离线入库</button>
      <button class="chip" data-flow="route">2 路由前</button>
      <button class="chip" data-flow="rag">A RAG</button>
      <button class="chip" data-flow="tool">B 单工具</button>
      <button class="chip" data-flow="workflow">C Workflow</button>
      <button class="chip" data-flow="plan">D Plan</button>
      <button class="chip" data-flow="post">7 生成兜底</button>
    </nav>
    <button class="small-btn" id="matrixOpen" type="button">要求矩阵</button>
    <button class="small-btn" id="themeToggle" type="button">Theme</button>
  </header>

  <main class="stage" id="stage">
    <div class="legend" aria-hidden="true">
      <span><i class="sw input"></i>输入/入口</span>
      <span><i class="sw"></i>处理节点</span>
      <span><i class="sw store"></i>知识/数据存储</span>
      <span><i class="sw tool"></i>工具/执行器</span>
      <span><i class="sw plan"></i>规划/反思</span>
      <span><i class="sw risk"></i>风控/兜底</span>
    </div>
    <svg id="diagram" viewBox="0 0 1900 1400" preserveAspectRatio="xMidYMid meet" role="img" aria-label="AI 智能投研助手 RAG Agent Skills 流程图"></svg>

    <section class="panel" id="flowcap" aria-live="polite">
      <div class="fname" id="flowName"></div>
      <p id="flowDesc"></p>
    </section>

    <section class="panel" id="detail" aria-live="polite">
      <h2>全景说明</h2>
      <div class="meta">CLICK A NODE</div>
      <p>图从本地 PDF 的离线/在线架构出发，结合 DeltaFStation 的 <code>AI Agent</code>、<code>ToolRegistry</code>、<code>ToolRunner</code>、<code>MCP</code>、回测与策略运行工具链，落到投研助手的四条执行路径。</p>
      <p>顶部路径按钮会高亮每条链路；点击节点可查看该节点的技术实现方式与业务含义。</p>
    </section>
  </main>

  <div class="drawer-mask" id="drawerMask"></div>
  <aside class="drawer" id="nodeDrawer" aria-hidden="true" aria-label="节点详情抽屉">
    <div class="drawer-header">
      <div>
        <h2 id="drawerTitle">节点详情</h2>
        <div class="drawer-meta" id="drawerMeta"></div>
      </div>
      <button class="drawer-close" id="drawerClose" type="button" aria-label="关闭">×</button>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
  </aside>

<script>
const NS = "http://www.w3.org/2000/svg";
const svg = document.getElementById("diagram");

const zones = [
  { id: "z-offline", x: 40, y: 76, w: 1820, h: 258, title: "1 离线知识库构建", sub: "多模态上传、解析、分块、标签、结构化抽取、向量/SQL/目录入库" },
  { id: "z-route", x: 40, y: 362, w: 1820, h: 220, title: "2 路由前：用户问题进入智能顾问", sub: "自然语言、快捷指令、场景感知、Memory、Query 改写、精准缓存、意图识别" },
  { id: "z-a", x: 40, y: 622, w: 435, h: 530, title: "A 知识查找 · RAG", sub: "三层问答策略 + 进阶 RAG Pipeline" },
  { id: "z-b", x: 505, y: 622, w: 405, h: 530, title: "B 单一工具调用", sub: "最高频意图：运行策略回测" },
  { id: "z-c", x: 940, y: 622, w: 420, h: 530, title: "C 多步骤标准化路径 · Workflow", sub: "策略运行/QMT 交易前检查与监控" },
  { id: "z-d", x: 1390, y: 622, w: 470, h: 530, title: "D Plan 自主规划", sub: "复杂开放式投研任务拆解、执行、反思" },
  { id: "z-post", x: 40, y: 1190, w: 1820, h: 170, title: "7 生成、后处理、兜底", sub: "答案聚合、引用、风控合规、UI 渲染、追问/转人工/拒答" }

function el(name, attrs = {}) {
  const n = document.createElementNS(NS, name);
  for (const [k, v] of Object.entries(attrs)) n.setAttribute(k === "className" ? "class" : k, v);
  return n;
}

function escapeHtml(str) {
  return String(str || "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#39;");
}

function nodeEdges(id) {
  const incoming = edges.filter(e => e.to === id);
  const outgoing = edges.filter(e => e.from === id);
  return { incoming, outgoing };
}

function edgeSummary(list, direction) {
  if (!list.length) return direction === "in" ? "起点节点，无上游依赖" : "终点或收口节点，无直接下游";
  return list.map(e => {
    const other = nodeMap.get(direction === "in" ? e.from : e.to);
    const label = e.label ? `（${e.label}）` : "";
    return `${other?.title || ""}${label}`;
  }).join(" / ");
}

function decisionText(node) {
  const { incoming, outgoing } = nodeEdges(node.id);
  if (node.kind === "gate") return `按置信度、命中情况或槽位完整度判断；下游：${edgeSummary(outgoing, "out")}`;
  if (node.kind === "risk") return `执行合规、权限、证据或异常检查；不通过时进入兜底/追问/拒答。`;
  if (node.kind === "tool") return `参数完整时调用工具；工具失败或返回异常时进入评估与兜底。`;
  if (node.kind === "plan") return `检查任务完成度、依赖关系与反思结果；未完成则继续循环。`;
  if (incoming.length || outgoing.length) return `承接上游：${edgeSummary(incoming, "in")}；输出到：${edgeSummary(outgoing, "out")}`;
  return "作为独立说明节点展示。";
}

function fallbackText(node) {
  if (node.kind === "risk") return "风险未通过：拒答、追问、转人工或低风险操作引导。";
  if (node.kind === "gate") return "置信度不足或分支不明确：追问澄清，或降级到 RAG/兜底策略。";
  if (node.kind === "tool") return "工具缺参、失败或返回歧义：多轮补槽、重试、展示候选或人工确认。";

  return "证据不足或上下文缺失时，进入缺失追问与统一兜底。";
}

    ["判断条件", decisionText(node)],
    ["输入内容", `${edgeSummary(incoming, "in")}；节点上下文：${node.meta}`],
    ["处理内容", node.detail],
    ["技术实现", node.tech],
    ["输出/下一步", edgeSummary(outgoing, "out")],
    ["异常/兜底", fallbackText(node)]
  ];
  const supplement = supplementText(node);
  if (supplement) rows.push(["图片补充", supplement]);
  return rows;
}

function renderSubtable(node) {
  return `
    <table class="subtable" aria-label="${escapeHtml(node.title)} 子表格">
      <tbody>
        ${childRows(node).map(([k, v]) => `<tr><th>${escapeHtml(k)}</th><td>${escapeHtml(v)}</td></tr>`).join("")}
      </tbody>
    </table>
  `;
}

function renderInlineCollapse(node) {
  return `
    <div class="node-collapse" role="region" aria-label="${escapeHtml(node.title)} 节点判断与内容表">
      <div class="collapse-head">
        <div>
          ${escapeHtml(node.title)}
          <span class="collapse-sub">${escapeHtml(node.lane)} · ${escapeHtml(kindLabels[node.kind] || node.kind)}</span>
        </div>
        <button class="drawer-link" type="button" data-collapse-drawer="${escapeHtml(node.id)}">详情</button>
      </div>
      <div class="collapse-body">
        ${renderSubtable(node)}
      </div>
    </div>
  `;
}

function collapsePlacement(node) {
  const panelW = 600;
  const panelH = 420;
  let x = node.x + node.w + 18;
  let y = node.y - 8;
  if (x + panelW > 1885) x = Math.max(20, node.x - panelW - 18);
  if (y + panelH > 1380) y = Math.max(20, 1380 - panelH);
  return { x, y, w: panelW, h: panelH };
}

function closeInlineCollapse(exceptId = "") {
  svg.querySelectorAll("[data-inline-panel]").forEach(panel => {
    if (panel.getAttribute("data-inline-panel") !== exceptId) panel.style.display = "none";
  });
  document.querySelectorAll("[data-collapse]").forEach(btn => {
    if (btn.getAttribute("data-collapse") !== exceptId) {
      btn.textContent = "+";
      btn.setAttribute("aria-expanded", "false");
    }
  });
}

function toggleInlineCollapse(id) {
  const panel = document.getElementById(`inline-panel-${id}`);
  const btn = document.querySelector(`[data-collapse="${id}"]`);
  if (!panel || !btn) return;
  const shouldOpen = panel.style.display === "none";
  closeInlineCollapse(id);
  panel.style.display = shouldOpen ? "" : "none";
  btn.textContent = shouldOpen ? "−" : "+";
  btn.setAttribute("aria-expanded", String(shouldOpen));
}

function addInlineCollapseControls() {
  const layer = el("g", { id: "inline-collapses" });
  const buttonLayer = el("g", { id: "collapse-buttons" });
  const panelLayer = el("g", { id: "collapse-panels" });
  nodes.forEach(node => {
    const btnHost = el("foreignObject", {
      x: node.x + node.w - 38,
      y: node.y + 8,
      width: 34,
      height: 34,
      className: "collapse-host"
    });
    const btn = document.createElement("button");
    btn.className = "collapse-toggle";
    btn.type = "button";
    btn.textContent = "+";
    btn.setAttribute("aria-label", `展开 ${node.title} 节点判断与内容表`);
    btn.setAttribute("aria-expanded", "false");
    btn.setAttribute("data-collapse", node.id);
    btn.addEventListener("click", event => {
      event.stopPropagation();
      toggleInlineCollapse(node.id);
    });
    btnHost.appendChild(btn);

    const placement = collapsePlacement(node);
    const panelHost = el("foreignObject", {
      id: `inline-panel-${node.id}`,
      x: placement.x,
      y: placement.y,
      width: placement.w,
      height: placement.h,
      className: "collapse-host",
      "data-inline-panel": node.id
    });
    panelHost.style.display = "none";
    const wrapper = document.createElement("div");
    wrapper.innerHTML = renderInlineCollapse(node);
    wrapper.querySelector("[data-collapse-drawer]")?.addEventListener("click", event => {
      event.stopPropagation();
      selectNode(node.id);
    });
    panelHost.appendChild(wrapper.firstElementChild);
    buttonLayer.appendChild(btnHost);
    panelLayer.appendChild(panelHost);
  });
  layer.append(buttonLayer, panelLayer);
  svg.appendChild(layer);
}

function openDrawer(id) {
  const node = nodeMap.get(id);
  if (!node) return;
  document.getElementById("nodeDrawer").classList.remove("wide");
  document.getElementById("drawerTitle").textContent = node.title;
  document.getElementById("drawerMeta").textContent = `${node.lane} · ${node.tech}`;
  document.getElementById("drawerBody").innerHTML = `
    <section class="drawer-section">
      <h3>节点内容</h3>
      <p>${escapeHtml(node.detail)}</p>
    </section>
    <section class="drawer-section">
      <h3>判断与流转</h3>
      <div class="drawer-grid">
        ${childRows(node).map(([k, v]) => `<div>${escapeHtml(k)}</div><div>${escapeHtml(v)}</div>`).join("")}
      </div>
    </section>
    <section class="drawer-section">
      <h3>节点标签</h3>
      <p><code>${escapeHtml(node.meta)}</code></p>
    </section>
  `;
  document.body.classList.add("drawer-open");
  document.getElementById("nodeDrawer").setAttribute("aria-hidden", "false");
}

function closeDrawer() {
  document.body.classList.remove("drawer-open");
  document.getElementById("nodeDrawer").setAttribute("aria-hidden", "true");
}

function renderDrawerTable(headers, rows, label) {
  return `
    <div class="drawer-table-scroll" role="region" aria-label="${escapeHtml(label)}">
      <table class="drawer-table">
        <thead>
          <tr>${headers.map(h => `<th>${escapeHtml(h)}</th>`).join("")}</tr>
        </thead>
        <tbody>
          ${rows.map(row => `<tr>${row.map(cell => `<td>${escapeHtml(cell)}</td>`).join("")}</tr>`).join("")}
        </tbody>
      </table>
    </div>
  `;
}

function openSupplementDrawer() {
  closeInlineCollapse();
  const drawer = document.getElementById("nodeDrawer");
  drawer.classList.add("wide");
  document.getElementById("drawerTitle").textContent = "画图要求与兜底矩阵";
  document.getElementById("drawerMeta").textContent = "补充图片信息 · 自查清单 · Fallback Matrix · Glossary";
  document.getElementById("drawerBody").innerHTML = `
    <section class="drawer-section">
      <h3>画图要求自查</h3>
      <p class="drawer-section-note">对应你给出的 7 项画图要求，说明当前流程图里已经出现的节点与判断。</p>
      ${renderDrawerTable(["模块", "必写", "可选", "当前呈现"], drawingRequirements, "画图要求自查")}
    </section>
    <section class="drawer-section">
      <h3>兜底策略总览</h3>
      ${renderDrawerTable(["兜底类型", "解决什么问题", "典型动作", "回到哪里"], fallbackStrategies, "兜底策略总览")}
    </section>
    <section class="drawer-section">
      <h3>全场景兜底矩阵</h3>
      ${renderDrawerTable(["环节", "失败/风险情况", "为什么要判断", "当下兜底", "回流优化"], fallbackMatrix, "全场景兜底矩阵")}
    </section>
    <section class="drawer-section">
      <h3>产品图节点与判断清单</h3>
      ${renderDrawerTable(["课程内容", "产品图里应该出现的节点", "必须写清楚的判断"], productChecklist, "产品图节点与判断清单")}
    </section>
    <section class="drawer-section">
      <h3>英文术语速记表</h3>
      ${renderDrawerTable(["英文", "中文", "你应该怎么理解"], glossary, "英文术语速记表")}
    </section>
  `;
  document.body.classList.add("drawer-open");
  drawer.setAttribute("aria-hidden", "false");
}

function wrapText(text, maxChars) {
  const s = String(text || "");
  if (s.length <= maxChars) return [s];
  const parts = [];
  let buf = "";
  for (const ch of s) {
    const size = [...buf].reduce((sum, c) => sum + (/[\u2E80-\u9FFF]/.test(c) ? 1 : 0.58), 0) + (/[\u2E80-\u9FFF]/.test(ch) ? 1 : 0.58);
    if (size > maxChars && buf) { parts.push(buf); buf = ch; } else { buf += ch; }
  }
  if (buf) parts.push(buf);
  return parts.slice(0, 3);
}

function addText(parent, text, x, y, cls, maxChars = 16, lineHeight = 15) {
  const t = el("text", { x, y, className: cls });
  wrapText(text, maxChars).forEach((line, i) => {
    const s = el("tspan", { x, dy: i === 0 ? 0 : lineHeight });
    s.textContent = line;
    t.appendChild(s);
  });
  parent.appendChild(t);
}

function anchor(n, side) {
  if (side === "left") return [n.x, n.y + n.h / 2];
  if (side === "right") return [n.x + n.w, n.y + n.h / 2];
  if (side === "top") return [n.x + n.w / 2, n.y];
  return [n.x + n.w / 2, n.y + n.h];
}

function edgePath(edge) {
  const a = nodeMap.get(edge.from);
  const b = nodeMap.get(edge.to);
  const dx = (b.x + b.w / 2) - (a.x + a.w / 2);
  const dy = (b.y + b.h / 2) - (a.y + a.h / 2);
  let startSide;
  let endSide;
  if (Math.abs(dx) > Math.abs(dy)) {
    startSide = dx >= 0 ? "right" : "left";
    endSide = dx >= 0 ? "left" : "right";
  } else {
    startSide = dy >= 0 ? "bottom" : "top";
    endSide = dy >= 0 ? "top" : "bottom";
  }
  if (edge.from === "d_done" && edge.to === "d_exec") {
    const [sx, sy] = anchor(a, "left");
    const [tx, ty] = anchor(b, "right");
    return `M${sx},${sy} C${sx - 110},${sy} ${tx + 110},${ty} ${tx},${ty}`;
  }
  if (edge.from === "risk" && edge.to === "fallback") {
    const [sx, sy] = anchor(a, "left");
    const [tx, ty] = anchor(b, "right");
    return `M${sx},${sy} C${sx - 120},${sy + 45} ${tx + 120},${ty + 45} ${tx},${ty}`;
  }
  const [sx, sy] = anchor(a, startSide);
  const [tx, ty] = anchor(b, endSide);
  if (startSide === "right" || startSide === "left") {
    const c = Math.max(60, Math.abs(tx - sx) * 0.46);
    const dir = startSide === "right" ? 1 : -1;
    return `M${sx},${sy} C${sx + dir * c},${sy} ${tx - dir * c},${ty} ${tx},${ty}`;
  }
  const c = Math.max(50, Math.abs(ty - sy) * 0.48);
  const dir = startSide === "bottom" ? 1 : -1;
  return `M${sx},${sy} C${sx},${sy + dir * c} ${tx},${ty - dir * c} ${tx},${ty}`;
}

function labelPoint(edge) {
  const a = nodeMap.get(edge.from);
  const b = nodeMap.get(edge.to);
  return [(a.x + a.w / 2 + b.x + b.w / 2) / 2, (a.y + a.h / 2 + b.y + b.h / 2) / 2 - 7];
}

function draw() {
  const defs = el("defs");
  defs.innerHTML = `
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" style="fill: var(--edge)"></path>
    </marker>
    <marker id="arrow-active" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" style="fill: var(--active)"></path>
    </marker>`;
  svg.appendChild(defs);

  const zoneLayer = el("g", { id: "zones" });
  zones.forEach(z => {
    const g = el("g", { className: "zone", id: z.id });
    g.appendChild(el("rect", { x: z.x, y: z.y, width: z.w, height: z.h }));
    const t = el("text", { className: "zt", x: z.x + 18, y: z.y + 28 });
    t.textContent = z.title;
    const s = el("text", { className: "zs", x: z.x + 18, y: z.y + 48 });
    s.textContent = z.sub;
    g.append(t, s);
    zoneLayer.appendChild(g);
  });
  svg.appendChild(zoneLayer);

  const edgeLayer = el("g", { id: "edges" });
  edges.forEach(ed => {
    const p = el("path", { id: ed.id, className: `edge${ed.dashed ? " dashed" : ""}`, d: edgePath(ed), "data-flow": ed.flow.join(" ") });
    edgeLayer.appendChild(p);
    if (ed.label) {
      const [lx, ly] = labelPoint(ed);
      const t = el("text", { id: `${ed.id}_label`, className: "edge-label", x: lx, y: ly, "text-anchor": "middle", "data-flow": ed.flow.join(" ") });
      t.textContent = ed.label;
      edgeLayer.appendChild(t);
    }
  });
  svg.appendChild(edgeLayer);

  const nodeLayer = el("g", { id: "nodes" });
  nodes.forEach(n => {
    const g = el("g", { id: n.id, className: `node ${n.kind}`, tabindex: "0", role: "button", "aria-label": n.title });
    g.appendChild(el("rect", { x: n.x, y: n.y, width: n.w, height: n.h }));
    const tag = el("text", { className: "tag", x: n.x + 14, y: n.y + 18 });
    tag.textContent = n.lane;
    g.appendChild(tag);
    addText(g, n.title, n.x + 14, n.y + 38, "nt", Math.max(9, Math.floor(n.w / 13)), 16);
    addText(g, n.meta, n.x + 14, n.y + n.h - 17, "nm", Math.max(12, Math.floor(n.w / 8)), 13);
    g.addEventListener("click", () => selectNode(n.id));
    g.addEventListener("keydown", ev => {
      if (ev.key === "Enter" || ev.key === " ") { ev.preventDefault(); selectNode(n.id); }
    });
    nodeLayer.appendChild(g);
  });
  svg.appendChild(nodeLayer);
  addInlineCollapseControls();
}

function selectNode(id) {
  closeInlineCollapse();
  svg.querySelectorAll(".node.selected").forEach(n => n.classList.remove("selected"));
  document.getElementById(id)?.classList.add("selected");
  const n = nodeMap.get(id);
  if (!n) return;
  document.getElementById("detail").innerHTML = `
    <h2>${escapeHtml(n.title)}</h2>
    <div class="meta">${escapeHtml(n.lane)} · ${escapeHtml(n.tech)}</div>
    <p>${escapeHtml(n.detail)}</p>
    <p><code>${escapeHtml(n.meta)}</code></p>
  `;
  openDrawer(id);
}

function setFlow(name) {
  document.querySelectorAll(".chip").forEach(c => c.classList.toggle("on", c.dataset.flow === name));
  const flow = flows[name] || flows.all;
  const active = name !== "all";
  svg.classList.toggle("flowing", active);
  svg.querySelectorAll(".lit").forEach(n => n.classList.remove("lit"));
  if (active) {
    edges.forEach(ed => {
      if (ed.flow.includes(name)) {
        document.getElementById(ed.id)?.classList.add("lit");
        document.getElementById(`${ed.id}_label`)?.classList.add("lit");
        document.getElementById(ed.from)?.classList.add("lit");
        document.getElementById(ed.to)?.classList.add("lit");
      }
    });
  }
  document.getElementById("flowName").textContent = flow[0];
  document.getElementById("flowDesc").textContent = flow[1];
  document.getElementById("flowcap").classList.toggle("show", active);
}

draw();

document.getElementById("chips").addEventListener("click", ev => {
  const btn = ev.target.closest(".chip");
  if (btn) setFlow(btn.dataset.flow);
});

document.getElementById("matrixOpen").addEventListener("click", openSupplementDrawer);

document.getElementById("themeToggle").addEventListener("click", () => {
  const root = document.documentElement;
  const dark = !root.classList.contains("dark");
  root.classList.toggle("dark", dark);
  localStorage.setItem("ai-investment-flow-theme", dark ? "dark" : "light");
});

document.getElementById("drawerClose").addEventListener("click", closeDrawer);
document.getElementById("drawerMask").addEventListener("click", closeDrawer);
document.addEventListener("keydown", event => {
  if (event.key === "Escape") {
    closeDrawer();
    closeInlineCollapse();
  }
});
</script>
</body>
